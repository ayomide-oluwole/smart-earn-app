name: Build Smart Earn APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean up bad resource files
        run: |
          rm -rf app/src/main/res/mipmap_hdpi || true
          rm -rf app/src/main/res/mipmap-hdpi || true
          rm -rf app/src/main/res/mipmap-mdpi || true
          rm -rf app/src/main/res/mipmap-xhdpi || true
          rm -rf app/src/main/res/mipmap-xxhdpi || true
          rm -rf app/src/main/res/mipmap-xxxhdpi || true

      - name: Create proper launcher icons
        run: |
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          
          # Foreground icon
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
            <path
                android:fillColor="#4CAF50"
                android:pathData="M54,54m-40,0a40,40 0,1 1,80 0a40,40 0,1 1,-80 0"/>
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M36,54l12,-12l12,12"/>
          </vector>
          EOF
          
          # Adaptive icon - correct format for mipmap-anydpi-v26
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          # Color resource
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#4CAF50</color>
          </resources>
          EOF
          
          # Fallback PNG icons (required for pre-v26 devices)
          # Create a tiny 48x48 PNG placeholder using base64
          echo "" | base64 -d > app/src/main/res/drawable/ic_launcher_foreground.png
          echo "" | base64 -d > app/src/main/res/drawable/ic_launcher_background.png

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartEarn-APK
          path: app/build/outputs/apk/debug/app-debug.apk

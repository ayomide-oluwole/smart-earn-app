name: Build Smart Earn APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: COMPLETELY wipe and recreate all resource files
        run: |
          # Delete ALL old launcher resources
          rm -rf app/src/main/res/mipmap-*
          rm -f app/src/main/res/drawable/ic_launcher_*
          rm -f app/src/main/res/values/colors.xml
          
          # Create clean structure
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values
          
          # Colors
          cat > app/src/main/res/values/colors.xml << 'ENDCOLOR'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#4CAF50</color>
          </resources>
          ENDCOLOR
          
          # Foreground drawable (XML only - NO PNG)
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ENDVEC'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,54m-40,0a40,40 0,1 1,80 0a40,40 0,1 1,-80 0"/>
              <path
                  android:fillColor="#4CAF50"
                  android:pathData="M36,54l12,-12l12,12l-12,12z"/>
          </vector>
          ENDVEC
          
          # Adaptive icon
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ENDADAPT'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ENDADAPT
          
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'ENDADAPT2'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ENDADAPT2
          
          echo "✅ Resources reset complete - no PNG files exist"

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartEarn-APK
          path: app/build/outputs/apk/debug/app-debug.apk
